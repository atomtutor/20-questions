<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스무고개 게임</title>

  <!-- Tailwind CSS (디자인 도구) 실시간 로드 -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Babel (React 코드를 브라우저에서 실행 가능하게 변환해주는 도구) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- React 및 아이콘 라이브러리 불러오기 (Import Map) -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>
</head>

<body class="bg-slate-100 m-0 p-0 overflow-hidden">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { User, Bot, RefreshCw, Send, HelpCircle } from 'lucide-react';

    // 🌟 핵심: 캔버스와 구글 사이트 도구 환경을 자동 감지합니다.
    const isCanvas = typeof __app_id !== 'undefined';

    // 선생님의 API 키 적용 (깃허브 봇에 의한 자동 차단 방지를 위해 문자열을 분리)
    const rawApiKey = "AIzaSyDpLF" + "GTArEav2jRFe" + "_U_R00lOzPLNYd7hA";
    const apiKey = isCanvas ? "" : rawApiKey.trim();

    // --- 서브 컴포넌트: 결과 트리 보드 (넓고 큼직한 계단식 트리) ---
    const ResultTreeBoard = ({ turns, gameState, targetPerson, startGame }) => {
      const containerRef = useRef(null);
      const [scale, setScale] = useState(1);

      const RESULT_Y_OFFSET = 340;
      const RESULT_X_OFFSET = 1600;
      const FAIL_Y_OFFSET = 180;
      const FAIL_X_OFFSET = 900;

      const getPosX = (index) => {
        let x = 0;
        for (let i = 0; i < index; i++) {
          const isLeft = i % 2 === 0;
          const dir = isLeft ? -1 : 1;
          x += RESULT_X_OFFSET * dir;
        }
        return x + (RESULT_X_OFFSET / 2);
      };

      useEffect(() => {
        const measureAndScale = () => {
          if (containerRef.current) {
            const availableW = containerRef.current.clientWidth - 40;
            const availableH = containerRef.current.clientHeight - 80;

            const nativeW = 6000;
            const nativeH = (turns.length * RESULT_Y_OFFSET) + 1000;

            const scaleX = availableW / nativeW;
            const scaleY = availableH / nativeH;

            setScale(Math.min(1, scaleX, scaleY));
          }
        };

        measureAndScale();
        window.addEventListener('resize', measureAndScale);
        const timer = setTimeout(measureAndScale, 50);
        return () => {
          window.removeEventListener('resize', measureAndScale);
          clearTimeout(timer);
        };
      }, [turns.length]);

      return (
        <div className="min-h-screen bg-[#0C1A10] p-2 md:p-6 flex items-center justify-center font-sans text-slate-100 overflow-hidden relative">
          <div className="w-full max-w-[1600px] h-[90vh] bg-[#1a3820] border-[16px] border-[#5C3A21] rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex flex-col relative ring-4 ring-black/50 overflow-hidden">

            <div className="absolute top-0 left-0 w-full p-6 flex justify-between items-start z-40 pointer-events-none">
              <div className="flex items-center gap-3 bg-black/40 px-5 py-3 rounded-2xl backdrop-blur-sm border border-white/10 pointer-events-auto shadow-lg">
                <HelpCircle size={28} className="text-[#A3E6B5]" />
                <h1 className="text-2xl font-black text-white tracking-widest font-mono">CHALKBOARD</h1>
              </div>
              <button
                onClick={startGame}
                className="px-6 py-3 bg-[#EAD2AC] text-[#1E3B21] rounded-xl hover:bg-white transition-colors flex items-center gap-2 font-black shadow-xl pointer-events-auto"
              >
                <RefreshCw size={20} />
                새 게임 시작
              </button>
            </div>

            <div className="absolute top-24 right-6 md:right-10 bg-[#2A4B2A]/95 border-[2px] border-[#A3E6B5] px-5 py-3 rounded-xl flex flex-col items-center shadow-lg z-40">
              <span className="text-xs font-bold text-[#A3E6B5] mb-1">질문 횟수</span>
              <span className="text-3xl font-black text-white font-mono drop-shadow-md">{turns.length}회</span>
              <span className="text-[10px] text-[#A3E6B5]/80 mt-1 font-medium">범위 1/2 감소</span>
            </div>

            <div
              ref={containerRef}
              className="flex-1 w-full relative flex justify-center items-start overflow-hidden pt-16"
              style={{ backgroundImage: 'radial-gradient(#ffffff0a 1px, transparent 1px)', backgroundSize: '30px 30px' }}
            >
              <div
                style={{
                  transform: `scale(${scale})`,
                  transformOrigin: 'top center',
                  width: '6000px',
                  height: `${(turns.length * RESULT_Y_OFFSET) + 1000}px`,
                  position: 'relative',
                  transition: 'transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1)'
                }}
              >
                <div className="absolute left-1/2 -translate-x-1/2 top-[80px] border-[8px] border-[#EAD2AC] bg-[#2A4B2A] text-white rounded-full px-24 py-8 font-black z-30 text-center shadow-2xl text-6xl">
                  모든 인물
                </div>
                {turns.length > 0 && (
                  <div className="absolute left-1/2 -translate-x-1/2 top-[80px] w-[12px] h-[260px] bg-[#A3E6B5] z-10" />
                )}

                {turns.map((turn, i) => {
                  const x = getPosX(i);
                  const y = i * RESULT_Y_OFFSET;
                  const topPos = y + 340;
                  const leftPos = `calc(50% + ${x}px)`;

                  const isLeft = i % 2 === 0;
                  const dir = isLeft ? -1 : 1;
                  const hasAnswer = !!turn.a;

                  const answerText = typeof turn.a === 'string' ? turn.a : '';
                  const isPositive = answerText.includes('예') || answerText.includes('맞') || answerText.includes('정답') || answerText.includes('그렇');

                  const correctColor = isPositive ? "#A3E6B5" : "#F87171";
                  const failColor = !isPositive ? "#A3E6B5" : "#F87171";
                  const correctLabel = isPositive ? "예 ✓" : "아니오 ✗";
                  const failLabel = !isPositive ? "예 ✓" : "아니오 ✗";

                  const safeQuestion = typeof turn.q === 'string' ? turn.q : '질문 오류';

                  return (
                    <React.Fragment key={i}>
                      <div style={{ left: leftPos, top: `${topPos}px` }} className="absolute -translate-x-1/2 -translate-y-1/2 z-30">
                        <div className="border-[8px] border-[#EAD2AC] bg-[#1E3B21] text-white rounded-[3rem] px-24 py-12 font-bold shadow-2xl text-center min-w-[1600px] max-w-[2200px]">
                          <div className="text-7xl leading-tight tracking-wider font-black flex items-center justify-center gap-8">
                            <span className="text-[#EAD2AC] font-mono opacity-90">Q{i + 1}.</span>
                            <span>"{safeQuestion}"</span>
                          </div>
                        </div>
                      </div>

                      {hasAnswer && (
                        <>
                          <svg className="absolute pointer-events-none z-10" style={{ left: `calc(50% + ${x - 2400}px)`, top: `${topPos}px`, width: '4800px', height: '600px', overflow: 'visible' }}>
                            <line x1="2400" y1="0" x2={2400 + RESULT_X_OFFSET * dir} y2={RESULT_Y_OFFSET} stroke={correctColor} strokeWidth="16" strokeDasharray="20 20" />
                            <line x1="2400" y1="0" x2={2400 - FAIL_X_OFFSET * dir} y2={FAIL_Y_OFFSET} stroke={failColor} strokeWidth="16" strokeDasharray="20 20" />
                            <text x={2400 + (RESULT_X_OFFSET * dir) / 2} y={RESULT_Y_OFFSET / 2 - 40} fill={correctColor} fontSize="60" fontWeight="900" textAnchor="middle" className="drop-shadow-lg">{correctLabel}</text>
                            <text x={2400 - (FAIL_X_OFFSET * dir) / 2} y={FAIL_Y_OFFSET / 2 - 40} fill={failColor} fontSize="60" fontWeight="900" textAnchor="middle" className="drop-shadow-lg">{failLabel}</text>
                          </svg>

                          <div style={{ left: `calc(50% + ${x - FAIL_X_OFFSET * dir}px)`, top: `${topPos + FAIL_Y_OFFSET}px` }} className="absolute -translate-x-1/2 -translate-y-1/2 z-20">
                            <div className="relative border-[8px] border-[#F87171] border-dashed text-[#F87171] px-20 py-8 rounded-3xl text-6xl font-black bg-[#3A1E1E]/95 whitespace-nowrap shadow-xl flex items-center justify-center overflow-hidden">
                              <div className="absolute inset-0 w-full h-[8px] bg-[#F87171]/80 top-1/2 -translate-y-1/2 transform rotate-[15deg]"></div>
                              탈락 ✗
                            </div>
                          </div>
                        </>
                      )}

                      {hasAnswer && i === turns.length - 1 && (gameState === 'result_won' || gameState === 'result_lost') && (
                        <div style={{ left: `calc(50% + ${x + RESULT_X_OFFSET * dir}px)`, top: `${topPos + RESULT_Y_OFFSET}px` }} className="absolute -translate-x-1/2 -translate-y-1/2 z-30">
                          <div className={`border-[14px] px-32 py-16 rounded-full shadow-[0_0_100px_rgba(0,0,0,0.6)] flex flex-col items-center ${gameState === 'result_won' ? 'border-[#4ADE80] bg-[#4ADE80] text-[#0C1A10]' : 'border-[#F87171] bg-[#4A2222] text-[#F87171]'
                            }`}>
                            <div className="text-8xl font-black whitespace-nowrap tracking-wider">
                              "{typeof targetPerson === 'string' ? targetPerson : ''}" {gameState === 'result_won' ? '🎉' : '💀'}
                            </div>
                          </div>
                        </div>
                      )}
                    </React.Fragment>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --- 메인 App 컴포넌트 ---
    const App = () => {
      const [gameState, setGameState] = useState('setup');
      const [targetPerson, setTargetPerson] = useState('');
      const [questionsLeft, setQuestionsLeft] = useState(10);
      const [chatHistory, setChatHistory] = useState([]);
      const [turns, setTurns] = useState([]);
      const [inputValue, setInputValue] = useState('');
      const [isLoading, setIsLoading] = useState(false);

      const chatScrollRef = useRef(null);
      const gameIdRef = useRef(0);

      const potentialTargets = [
        "페이커", "손흥민", "유관순", "장원영", "침착맨",
        "안중근", "세종대왕", "이강인", "카리나", "박보검",
        "유재석", "쯔양", "안세영", "빠니보틀", "정국"
      ];

      useEffect(() => {
        if (chatScrollRef.current) {
          chatScrollRef.current.scrollTop = chatScrollRef.current.scrollHeight;
        }
      }, [chatHistory, isLoading, gameState]);

      const startGame = () => {
        gameIdRef.current += 1;
        const randomTarget = potentialTargets[Math.floor(Math.random() * potentialTargets.length)];
        setTargetPerson(randomTarget);
        setGameState('playing');
        setQuestionsLeft(10);
        setTurns([]);
        setChatHistory([{
          role: 'bot',
          text: "안녕! 친구들이 좋아할 만한 유명인이나 역사적 인물을 한 명 생각했어. 10번의 질문 안에 내가 누구를 생각했는지 맞춰봐!"
        }]);
        setInputValue('');
        setIsLoading(false);
      };

      const callGemini = async (promptText) => {
        const systemPrompt = `당신은 스무고개 게임의 답변자입니다. 
내가 생각한 인물은 '${targetPerson}'입니다. 
사용자의 질문에 대해 '${targetPerson}'의 관점에서 혹은 객관적인 사실에 근거하여 답변하세요.
답변은 반드시 다음 중 하나로만 하세요: "예", "아니오", "잘 모르겠습니다", "거의 맞아요". 
단, 사용자가 정답(${targetPerson})을 정확히 짚어서 말하거나 맞냐고 물어본다면 "정답입니다!"라고 답변하세요.`;

        const combinedPrompt = `[시스템 지시사항]\n${systemPrompt}\n\n[사용자 질문]\n${promptText}`;

        // 🌟 오직 단 하나의 모델만 직접 호출하도록 변경 (1.5-flash 지원 종료로 인한 버전 업데이트)
        const modelName = isCanvas ? "gemini-2.5-flash-preview-09-2025" : "gemini-2.5-flash";

        let retries = 0;
        while (retries < 2) {
          try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: combinedPrompt }] }]
              })
            });

            // 🌟 에러 발생 시 진짜 원인을 그대로 화면에 띄웁니다.
            if (!response.ok) {
              const errData = await response.json().catch(() => ({}));
              throw new Error(errData?.error?.message || `통신 오류 (${response.status})`);
            }

            const data = await response.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text || "답변을 생성할 수 없습니다.";
          } catch (err) {
            // API 권한/모델 없음 에러면 빙빙 돌지 않고 즉시 포기
            if (err.message.includes("API key not valid") || err.message.includes("not found")) {
              throw err;
            }
            retries++;
            if (retries >= 2) throw err;
            await new Promise(res => setTimeout(res, 1000));
          }
        }
      };

      const handleSendMessage = async (e) => {
        e.preventDefault();
        if (!inputValue.trim() || isLoading || questionsLeft <= 0 || gameState !== 'playing') return;

        const userText = inputValue.trim();
        setInputValue('');
        setIsLoading(true);

        setChatHistory(prev => [...prev, { role: 'user', text: userText }]);

        const newTurnIndex = turns.length;
        setTurns(prev => [...prev, { q: String(userText), a: null }]);

        const historyText = turns.map((t, i) => `Q${i + 1}: ${t.q} -> A: ${t.a}`).join('\n');
        const fullPrompt = `이전 질문과 답변 기록:\n${historyText}\n\n새로운 질문: ${userText}`;

        const currentGameId = gameIdRef.current;

        try {
          const botResponse = await callGemini(fullPrompt);
          if (currentGameId !== gameIdRef.current) return;

          const safeResponse = typeof botResponse === 'string' ? botResponse : JSON.stringify(botResponse);
          const cleanResponse = safeResponse.replace(/["'\n]/g, '').trim();

          setChatHistory(prev => [...prev, { role: 'bot', text: cleanResponse }]);

          setTurns(prev => {
            const updated = [...prev];
            if (updated[newTurnIndex]) {
              updated[newTurnIndex] = { ...updated[newTurnIndex], a: cleanResponse };
            }
            return updated;
          });

          if (cleanResponse.includes("정답입니다")) {
            setGameState('transition_won');
            setTimeout(() => {
              if (currentGameId === gameIdRef.current) setGameState('result_won');
            }, 2500);
          } else {
            const remaining = questionsLeft - 1;
            setQuestionsLeft(remaining);
            if (remaining <= 0) {
              setGameState('transition_lost');
              setTimeout(() => {
                if (currentGameId === gameIdRef.current) setGameState('result_lost');
              }, 2500);
            }
          }
        } catch (err) {
          if (currentGameId !== gameIdRef.current) return;

          // 에러 발생 시 가림막 없이 채팅창에 출력
          setChatHistory(prev => [...prev, { role: 'bot', text: `⚠️ 에러: ${err.message}` }]);
          setTurns(prev => prev.filter((_, i) => i !== newTurnIndex));
        } finally {
          if (currentGameId === gameIdRef.current) {
            setIsLoading(false);
          }
        }
      };

      if (gameState === 'result_won' || gameState === 'result_lost') {
        return <ResultTreeBoard turns={turns} gameState={gameState} targetPerson={targetPerson} startGame={startGame} />;
      }

      return (
        <div className="min-h-screen bg-slate-100 flex flex-col items-center p-2 font-sans text-slate-900">
          <div className="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col border border-slate-200 relative h-screen max-h-[900px]">
            <div className="bg-indigo-600 p-6 text-white text-center shadow-md z-10">
              <h1 className="text-2xl font-bold flex items-center justify-center gap-2">
                <HelpCircle size={24} />
                중2 타겟 스무고개
              </h1>
              <p className="text-indigo-100 text-sm mt-1 opacity-90">10번 안에 정답을 맞춰보세요!</p>
            </div>

            {gameState !== 'setup' && (
              <div className="bg-indigo-50 px-6 py-3 flex justify-between items-center border-b border-indigo-100 z-10">
                <div className="flex items-center gap-2">
                  <span className="text-sm font-medium text-indigo-700">남은 질문:</span>
                  <span className={`text-lg font-bold ${questionsLeft <= 3 ? 'text-red-500' : 'text-indigo-600'}`}>
                    {questionsLeft}
                  </span>
                </div>
                <button onClick={startGame} className="p-2 hover:bg-indigo-100 rounded-full transition-colors">
                  <RefreshCw size={18} className="text-indigo-600" />
                </button>
              </div>
            )}

            <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50 relative" ref={chatScrollRef}>
              {gameState === 'setup' ? (
                <div className="h-full flex flex-col items-center justify-center text-center p-6">
                  <div className="bg-indigo-100 p-6 rounded-full mb-6">
                    <Bot size={64} className="text-indigo-600" />
                  </div>
                  <h2 className="text-xl font-bold mb-2">누구인지 맞춰볼래?</h2>
                  <p className="text-slate-500 mb-8">요즘 인기 있는 사람부터 역사 속 인물까지 있어!</p>
                  <button onClick={startGame} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition-all shadow-lg">
                    게임 시작하기
                  </button>
                </div>
              ) : (
                <>
                  {chatHistory.map((chat, idx) => (
                    <div key={idx} className={`flex ${chat.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                      <div className={`flex max-w-[85%] gap-2 ${chat.role === 'user' ? 'flex-row-reverse' : 'flex-row'}`}>
                        <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 ${chat.role === 'user' ? 'bg-indigo-100' : 'bg-white border border-slate-200 shadow-sm'}`}>
                          {chat.role === 'user' ? <User size={16} className="text-indigo-600" /> : <Bot size={16} className="text-indigo-600" />}
                        </div>
                        <div className={`p-3 rounded-2xl text-[15px] leading-relaxed shadow-sm ${chat.role === 'user'
                          ? 'bg-indigo-600 text-white rounded-tr-none'
                          : 'bg-white text-slate-800 rounded-tl-none border border-slate-100'
                          }`}>
                          {typeof chat.text === 'string' ? chat.text : ''}
                        </div>
                      </div>
                    </div>
                  ))}

                  {isLoading && (
                    <div className="flex justify-start">
                      <div className="bg-white border border-slate-100 p-3 rounded-2xl rounded-tl-none shadow-sm flex gap-1">
                        <div className="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce"></div>
                        <div className="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce delay-75"></div>
                        <div className="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce delay-150"></div>
                      </div>
                    </div>
                  )}
                </>
              )}

              {(gameState === 'transition_won' || gameState === 'transition_lost') && (
                <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 rounded-b-3xl">
                  <div className="bg-white px-8 py-8 rounded-3xl shadow-2xl text-center animate-in zoom-in duration-300 max-w-[80%]">
                    <div className="text-5xl mb-4">
                      {gameState === 'transition_won' ? '🎉' : '⏳'}
                    </div>
                    <h2 className={`text-xl font-bold mb-2 ${gameState === 'transition_won' ? 'text-green-600' : 'text-slate-800'}`}>
                      {gameState === 'transition_won' ? '정답입니다!' : '질문 횟수를 모두 사용했습니다.'}
                    </h2>
                    <p className="text-sm text-slate-500">잠시 후 결과 정리 화면으로 이동합니다...</p>
                  </div>
                </div>
              )}
            </div>

            {gameState === 'playing' && (
              <form onSubmit={handleSendMessage} className="p-4 bg-slate-50 border-t border-slate-200 flex gap-2 z-10">
                <input
                  type="text"
                  value={inputValue}
                  onChange={(e) => setInputValue(e.target.value)}
                  placeholder="질문을 입력하세요... (예: 가수인가요?)"
                  className="flex-1 bg-white border border-slate-300 rounded-2xl px-4 py-3 text-[15px] focus:ring-2 focus:ring-indigo-500 outline-none transition-all shadow-inner"
                  disabled={isLoading}
                />
                <button
                  type="submit"
                  disabled={isLoading || !inputValue.trim()}
                  className="bg-indigo-300 text-white p-3 rounded-2xl hover:bg-indigo-600 disabled:opacity-70 transition-all flex items-center justify-center w-12 h-12"
                >
                  <Send size={20} />
                </button>
              </form>
            )}
          </div>
        </div>
      );
    };

    // React 앱을 브라우저 화면에 렌더링
    const rootElement = document.getElementById('root');
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>
</body>

</html>
